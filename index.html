<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced YouTube Tracker with Graph & QR</title>
    
    <!-- External Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --text: #0f172a;
            --card-bg: #ffffff;
            --dark-player: #0f172a;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 900px;
            width: 100%;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; margin-bottom: 20px; }
        .clock-box { background: #1e293b; color: #10b981; padding: 8px 15px; border-radius: 6px; font-family: monospace; font-size: 1.2rem; font-weight: bold; }
        
        .input-group { display: flex; gap: 10px; margin-bottom: 15px; }
        input[type="text"] { flex: 1; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 1rem; }
        .btn-primary { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 1rem; font-weight: bold; transition: 0.2s; }
        .btn-primary:hover { background: #1d4ed8; }
        
        /* ---------------- Custom Player Wrapper ---------------- */
        #video-wrapper {
            width: 100%;
            background: var(--dark-player);
            border-radius: 8px;
            overflow: hidden;
            display: none;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
            position: relative;
        }
        
        #player-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            background: #000;
        }
        
        /* Fullscreen handling */
        #video-wrapper:fullscreen { border-radius: 0; width: 100vw !important; height: 100vh !important; display: flex; flex-direction: column; background: #000; }
        #video-wrapper:fullscreen #player-container { padding-bottom: 0; flex-grow: 1; height: calc(100vh - 70px); }
        
        #video-wrapper:-webkit-full-screen { border-radius: 0; width: 100vw !important; height: 100vh !important; display: flex; flex-direction: column; background: #000; }
        #video-wrapper:-webkit-full-screen #player-container { padding-bottom: 0; flex-grow: 1; height: calc(100vh - 70px); }
        
        /* Completely disable interactions on YouTube iframe to stop redirects */
        #player { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; pointer-events: none; }
        
        /* Glass panel captures all clicks for our custom logic */
        .glass-panel { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; cursor: pointer; }
        
        /* Big Initial Play Button */
        #big-play-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(37, 99, 235, 0.9); color: white; border: none;
            font-size: 1.5rem; font-weight: bold; padding: 20px 40px; border-radius: 50px;
            cursor: pointer; z-index: 20; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: 0.2s;
        }
        #big-play-btn:hover { background: #1d4ed8; transform: translate(-50%, -50%) scale(1.05); }

        .skip-feedback {
            position: absolute; top: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.75); color: white; padding: 15px 25px;
            border-radius: 30px; font-size: 1.5rem; font-weight: bold;
            pointer-events: none; opacity: 0; transition: opacity 0.3s ease; z-index: 30;
        }
        .skip-feedback.show { opacity: 1; }

        /* ---------------- Custom Control Bar ---------------- */
        .custom-controls {
            display: flex; align-items: center; justify-content: space-between; gap: 12px;
            background: #0f172a; padding: 12px 15px; color: white; flex-wrap: wrap;
            border-top: 1px solid #1e293b;
        }
        .control-group { display: flex; align-items: center; gap: 10px; }
        .control-btn { background: #334155; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .control-btn:hover { background: #475569; }
        .time-display { font-family: monospace; font-size: 0.95rem; white-space: nowrap; color: #cbd5e1; }
        
        #progress-bar { flex-grow: 1; cursor: pointer; height: 6px; border-radius: 5px; accent-color: var(--primary); min-width: 100px; }
        .speed-slider { width: 70px; cursor: pointer; accent-color: #10b981; }

        .report-btn { background: #dc2626; width: 100%; margin-top: 15px; padding: 15px; display: none; }
        .report-btn:hover { background: #b91c1c; }
        .download-btn { background: #10b981; width: 100%; margin-top: 15px; padding: 15px; display: none; }
        .download-btn:hover { background: #059669; }
        
        /* ---------------- Report Section ---------------- */
        #printable-report { background: #ffffff; padding: 30px; border-radius: 8px; border: 2px solid #e2e8f0; margin-top: 20px; }
        .report-header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 2px dashed #cbd5e1; padding-bottom: 15px; margin-bottom: 20px; }
        .summary-box { background: #f1f5f9; padding: 15px; border-radius: 6px; font-weight: bold; line-height: 1.6; }
        #qrcode-container { text-align: center; background: #fff; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; }
        #qrcode-container p { margin: 5px 0 0 0; font-size: 0.8rem; color: #64748b; font-weight: bold; }
        .chart-container { position: relative; width: 100%; height: 350px; margin: 20px 0; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px; box-sizing: border-box; }
        .log-item { padding: 8px; border-bottom: 1px solid #cbd5e1; font-size: 0.95rem; }
        .log-item span { font-weight: bold; }
        
        @media (max-width: 600px) {
            .report-header { flex-direction: column; align-items: center; gap: 15px; text-align: center; }
            .chart-container { height: 250px; }
            .custom-controls { justify-content: center; }
            #progress-bar { width: 100%; order: -1; margin-bottom: 5px; } 
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>Advanced Video Tracker</h2>
        <div class="clock-box" id="ist-clock">00:00:00 AM</div>
    </div>

    <div class="input-group">
        <input type="text" id="video-url" placeholder="Enter YouTube Video URL here...">
        <button class="btn-primary" onclick="initVideoLoad()">Load Video</button>
    </div>

    <div id="video-wrapper">
        <div id="player-container">
            <!-- IMPORTANT: Using div instead of iframe to prevent API crashes -->
            <div id="player"></div>
            
            <!-- Glass Panel to catch all clicks safely -->
            <div class="glass-panel" onclick="handleVideoClick(event)"></div>
            
            <!-- Big Play Button to bypass browser auto-play blocks -->
            <button id="big-play-btn" onclick="startInitialPlayback(event)">▶ Start Video</button>
            
            <div id="skip-feedback" class="skip-feedback"></div>
        </div>
        
        <div class="custom-controls">
            <div class="control-group">
                <button id="play-pause-btn" class="control-btn" onclick="togglePlayPause()">▶ Play</button>
                <span id="time-display" class="time-display">0:00 / 0:00</span>
            </div>
            
            <input type="range" id="progress-bar" min="0" max="100" value="0" step="0.1" 
                   oninput="draggingTimeline()" onchange="seekVideo()">
            
            <div class="control-group">
                <label style="font-size: 0.85rem;">Speed: <span id="speed-display">1.0x</span></label>
                <input type="range" id="speed-slider" class="speed-slider" min="0.5" max="3" step="0.25" value="1" oninput="changeSpeed()">
                <button onclick="toggleFullScreen()" class="control-btn" style="background: #10b981;">⛶ Full Screen</button>
            </div>
        </div>
    </div>

    <button id="generate-report-btn" class="btn-primary report-btn" onclick="generateReport()">End Session & Generate Report</button>
    
    <div id="report-wrapper" style="display:none;">
        <div id="printable-report">
            <div class="report-header">
                <div>
                    <h3 style="margin-top:0; color:#1e293b;">Official Watch Report</h3>
                    <div class="summary-box" id="report-summary"></div>
                </div>
                <div id="qrcode-container">
                    <div id="qrcode"></div>
                    <p>Auth Signature</p>
                </div>
            </div>

            <h4>Timeline Graph (Real-time vs. Video Time):</h4>
            <div class="chart-container">
                <canvas id="watchGraph"></canvas>
            </div>

            <h4>Detailed Tracking Logs:</h4>
            <div id="report-logs"></div>
        </div>
        <button class="btn-primary download-btn" id="download-btn" onclick="downloadReportAsPNG()">Download Report as PNG</button>
    </div>
</div>

<script>
    // 1. Clock Setup
    function updateClock() {
        const now = new Date();
        document.getElementById('ist-clock').innerText = now.toLocaleTimeString('en-IN', { timeZone: 'Asia/Kolkata', hour12: true });
    }
    setInterval(updateClock, 1000);
    updateClock();

    // 2. Global Variables
    let player;
    let activityLogs = [];
    let graphData = []; 
    let sessionStartTime = null;
    let isVideoPlaying = false;
    let trackingInterval;
    let lastVideoTime = 0;
    
    let totalRealPlayTimeMs = 0;
    let totalRealPauseTimeMs = 0;
    let seekCount = 0;
    let currentSpeed = 1;
    let isDraggingTimeline = false;
    let isFirstPlay = true;

    // Load YT API safely
    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    const firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    function extractVideoID(url) {
        const match = url.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/);
        return (match && match[2].length === 11) ? match[2] : null;
    }

    // 3. Initialization
    function initVideoLoad() {
        const videoId = extractVideoID(document.getElementById('video-url').value);
        if (!videoId) return alert("Please enter a valid YouTube link!");

        document.getElementById('video-wrapper').style.display = "block";
        document.getElementById('generate-report-btn').style.display = "block";
        document.getElementById('report-wrapper').style.display = "none";
        
        // Reset Variables
        activityLogs = [];
        graphData = [];
        sessionStartTime = new Date();
        totalRealPlayTimeMs = 0;
        totalRealPauseTimeMs = 0;
        seekCount = 0;
        currentSpeed = 1;
        lastVideoTime = 0;
        isDraggingTimeline = false;
        isFirstPlay = true;
        
        document.getElementById('speed-slider').value = 1;
        document.getElementById('speed-display').innerText = "1.0x";
        document.getElementById('progress-bar').value = 0;
        document.getElementById('big-play-btn').style.display = "block"; // Show Big Button
        
        logActivity("System", "Video session started", 0);

        let currentOrigin = window.location.origin;
        if (!currentOrigin || currentOrigin === "null" || window.location.protocol.startsWith("file")) {
            currentOrigin = "https://www.youtube.com"; 
        }

        // Destroy existing player if any to prevent iframe conflicts
        if (player && typeof player.destroy === 'function') {
            player.destroy();
        }

        // Recreate the div for the API to hook into
        document.getElementById('player-container').insertAdjacentHTML('afterbegin', '<div id="player"></div>');

        player = new YT.Player('player', {
            videoId: videoId,
            host: 'https://www.youtube.com',
            playerVars: { 
                'controls': 0,          // Removes all YouTube controls
                'disablekb': 1,         // Removes keyboard shortcuts
                'rel': 0,               // No related videos
                'modestbranding': 1,    // Hides YT logo
                'playsinline': 1,       // CRUCIAL FOR MOBILE! Stops native fullscreen takeover.
                'origin': currentOrigin, 
                'enablejsapi': 1
            },
            events: {
                'onStateChange': onPlayerStateChange,
                'onPlaybackRateChange': onPlaybackRateChange,
                'onReady': () => { setInterval(updateCustomUI, 500); }
            }
        });

        clearInterval(trackingInterval);
        trackingInterval = setInterval(trackRealtimeData, 1000);
    }

    // 4. Custom Interaction Logic
    function startInitialPlayback(event) {
        event.stopPropagation(); // Stop click from hitting the glass panel
        document.getElementById('big-play-btn').style.display = "none";
        if (player && typeof player.playVideo === 'function') {
            player.playVideo();
            isFirstPlay = false;
        }
    }

    let clickTimer = null;
    function handleVideoClick(event) {
        if (isFirstPlay || !player || typeof player.getCurrentTime !== 'function') return;

        const rect = event.target.getBoundingClientRect();
        const clickX = event.clientX - rect.left;
        
        if (clickTimer) {
            clearTimeout(clickTimer);
            clickTimer = null;
            // Double Click detected
            if (clickX < rect.width * 0.4) {
                skipTime(-10); // Left side
            } else if (clickX > rect.width * 0.6) {
                skipTime(10); // Right side
            }
        } else {
            // Single Click detected
            clickTimer = setTimeout(() => {
                clickTimer = null;
                togglePlayPause();
            }, 250);
        }
    }

    function togglePlayPause() {
        if (!player || typeof player.getPlayerState !== 'function') return;
        if (player.getPlayerState() === YT.PlayerState.PLAYING) {
            player.pauseVideo();
        } else {
            player.playVideo();
        }
    }

    function skipTime(seconds) {
        if (!player || typeof player.getCurrentTime !== 'function') return;
        const newTime = player.getCurrentTime() + seconds;
        player.seekTo(newTime, true);
        
        // Visual Feedback
        const feedback = document.getElementById('skip-feedback');
        feedback.innerText = seconds > 0 ? ">> 10s" : "<< 10s";
        feedback.style.left = seconds > 0 ? "75%" : "25%";
        feedback.classList.add('show');
        setTimeout(() => feedback.classList.remove('show'), 400);
    }

    // 5. Controls Logic
    function formatTimeSec(seconds) {
        if (isNaN(seconds)) return "0:00";
        const m = Math.floor(seconds / 60);
        const s = Math.floor(seconds % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
    }

    function updateCustomUI() {
        if (!player || !player.getCurrentTime || isDraggingTimeline) return;
        const current = player.getCurrentTime();
        const duration = player.getDuration();
        
        if (duration > 0) {
            document.getElementById('progress-bar').value = (current / duration) * 100;
            document.getElementById('time-display').innerText = `${formatTimeSec(current)} / ${formatTimeSec(duration)}`;
        }
    }

    function draggingTimeline() {
        isDraggingTimeline = true;
        if (!player || !player.getDuration) return;
        const val = document.getElementById('progress-bar').value;
        const duration = player.getDuration();
        document.getElementById('time-display').innerText = `${formatTimeSec((val / 100) * duration)} / ${formatTimeSec(duration)}`;
    }

    function seekVideo() {
        if (!player || !player.getDuration) return;
        const val = document.getElementById('progress-bar').value;
        const duration = player.getDuration();
        player.seekTo((val / 100) * duration, true);
        isDraggingTimeline = false;
    }

    function changeSpeed() {
        const speed = document.getElementById('speed-slider').value;
        document.getElementById('speed-display').innerText = speed + "x";
        if (player && typeof player.setPlaybackRate === 'function') {
            player.setPlaybackRate(parseFloat(speed));
        }
    }

    function toggleFullScreen() {
        const wrapper = document.getElementById('video-wrapper');
        if (!document.fullscreenElement && !document.webkitFullscreenElement) {
            if (wrapper.requestFullscreen) { wrapper.requestFullscreen(); }
            else if (wrapper.webkitRequestFullscreen) { wrapper.webkitRequestFullscreen(); } // Mobile Safari/Chrome
        } else {
            if (document.exitFullscreen) { document.exitFullscreen(); }
            else if (document.webkitExitFullscreen) { document.webkitExitFullscreen(); }
        }
    }

    // 6. Tracking logic
    function trackRealtimeData() {
        if (!player || !player.getCurrentTime) return;
        
        const now = new Date();
        const elapsedRealSec = Math.floor((now - sessionStartTime) / 1000);
        const currentVideoTime = player.getCurrentTime();

        if (isVideoPlaying) {
            const expectedTime = lastVideoTime + (1 * currentSpeed);
            if (Math.abs(currentVideoTime - expectedTime) > 2.5) {
                seekCount++;
                logActivity("Seek/Drag", `Video timeline jumped`, currentVideoTime);
            }
            totalRealPlayTimeMs += 1000;
        } else {
            totalRealPauseTimeMs += 1000;
        }

        graphData.push({ x: elapsedRealSec, y: currentVideoTime });
        lastVideoTime = currentVideoTime;
    }

    function onPlayerStateChange(event) {
        const vTime = player.getCurrentTime();
        const btn = document.getElementById('play-pause-btn');
        
        if (event.data == YT.PlayerState.PLAYING) {
            isVideoPlaying = true;
            btn.innerHTML = "⏸ Pause";
            btn.style.background = "#dc2626"; 
            logActivity("Play", "Video started playing", vTime);
        } else if (event.data == YT.PlayerState.PAUSED) {
            isVideoPlaying = false;
            btn.innerHTML = "▶ Play";
            btn.style.background = "#334155"; 
            logActivity("Pause", "Video paused", vTime);
        } else if (event.data == YT.PlayerState.ENDED) {
            btn.innerHTML = "↺ Replay";
        }
    }

    function onPlaybackRateChange(event) {
        currentSpeed = event.
