<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced YouTube Tracker with Graph & QR</title>
    
    <!-- External Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --text: #0f172a;
            --card-bg: #ffffff;
            --dark-player: #0f172a;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 900px;
            width: 100%;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; margin-bottom: 20px; }
        .clock-box { background: #1e293b; color: #10b981; padding: 8px 15px; border-radius: 6px; font-family: monospace; font-size: 1.2rem; font-weight: bold; }
        
        .input-group { display: flex; gap: 10px; margin-bottom: 15px; }
        input[type="text"] { flex: 1; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 1rem; }
        .btn-primary { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 1rem; font-weight: bold; transition: 0.2s; }
        .btn-primary:hover { background: #1d4ed8; }
        
        /* ---------------- Custom Player Wrapper ---------------- */
        #video-wrapper {
            width: 100%;
            background: var(--dark-player);
            border-radius: 8px;
            overflow: hidden;
            display: none;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
            position: relative;
        }
        /* Fullscreen handling */
        #video-wrapper:fullscreen { border-radius: 0; display: flex; flex-direction: column; justify-content: center; height: 100vh; }
        #video-wrapper:-webkit-full-screen { border-radius: 0; display: flex; flex-direction: column; justify-content: center; height: 100vh; width: 100vw; }
        
        #player-container { position: relative; width: 100%; padding-bottom: 56.25%; flex-grow: 1; }
        #video-wrapper:fullscreen #player-container { padding-bottom: 0; }
        #video-wrapper:-webkit-full-screen #player-container { padding-bottom: 0; }
        
        /* Disable all pointer events on the iframe to physically block YouTube UI clicks */
        #player { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; pointer-events: none; }
        
        /* Invisible shield covering the entire video to handle custom clicks */
        #video-shield { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 50; cursor: pointer; }
        
        .skip-feedback {
            position: absolute; top: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.75); color: white; padding: 15px 25px;
            border-radius: 30px; font-size: 1.5rem; font-weight: bold;
            pointer-events: none; opacity: 0; transition: opacity 0.3s ease; z-index: 60;
        }
        .skip-feedback.show { opacity: 1; }

        /* ---------------- Custom Control Bar ---------------- */
        .custom-controls {
            display: flex; align-items: center; justify-content: space-between; gap: 12px;
            background: #0f172a; padding: 12px 15px; color: white; flex-wrap: wrap; z-index: 60;
        }
        .control-group { display: flex; align-items: center; gap: 10px; }
        .control-btn {
            background: #334155; color: white; border: none; padding: 8px 12px;
            border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        .control-btn:hover { background: #475569; }
        .time-display { font-family: monospace; font-size: 0.95rem; white-space: nowrap; color: #cbd5e1; }
        
        /* Custom Progress Bar */
        #progress-bar { flex-grow: 1; cursor: pointer; height: 6px; border-radius: 5px; accent-color: var(--primary); min-width: 100px; }
        /* Custom Speed Slider */
        .speed-slider { width: 70px; cursor: pointer; accent-color: #10b981; }

        .report-btn { background: #dc2626; width: 100%; margin-top: 15px; padding: 15px; display: none; }
        .report-btn:hover { background: #b91c1c; }
        .download-btn { background: #10b981; width: 100%; margin-top: 15px; padding: 15px; display: none; }
        .download-btn:hover { background: #059669; }
        
        /* ---------------- Report Section ---------------- */
        #printable-report { background: #ffffff; padding: 30px; border-radius: 8px; border: 2px solid #e2e8f0; margin-top: 20px; }
        .report-header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 2px dashed #cbd5e1; padding-bottom: 15px; margin-bottom: 20px; }
        .summary-box { background: #f1f5f9; padding: 15px; border-radius: 6px; font-weight: bold; line-height: 1.6; }
        #qrcode-container { text-align: center; background: #fff; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; }
        #qrcode-container p { margin: 5px 0 0 0; font-size: 0.8rem; color: #64748b; font-weight: bold; }
        .chart-container { position: relative; width: 100%; height: 350px; margin: 20px 0; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px; box-sizing: border-box; }
        .log-item { padding: 8px; border-bottom: 1px solid #cbd5e1; font-size: 0.95rem; }
        .log-item span { font-weight: bold; }
        
        @media (max-width: 600px) {
            .report-header { flex-direction: column; align-items: center; gap: 15px; text-align: center; }
            .chart-container { height: 250px; }
            .custom-controls { justify-content: center; }
            #progress-bar { width: 100%; order: -1; margin-bottom: 5px; } /* Moves progress bar to top on mobile */
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>Advanced Video Tracker</h2>
        <div class="clock-box" id="ist-clock">00:00:00 AM</div>
    </div>

    <div class="input-group">
        <input type="text" id="video-url" placeholder="Enter YouTube Video URL here...">
        <button class="btn-primary" onclick="loadVideo()">Load Video</button>
    </div>

    <!-- Complete Custom Player Wrapper -->
    <div id="video-wrapper">
        <div id="player-container">
            <!-- Invisible Shield to capture all clicks and BLOCK YouTube UI -->
            <div id="video-shield" onclick="handleVideoClick(event)"></div>
            <div id="skip-feedback" class="skip-feedback"></div>
            
            <iframe id="player" allow="autoplay; fullscreen"></iframe>
        </div>
        
        <!-- Custom Control Panel -->
        <div class="custom-controls">
            <div class="control-group">
                <button id="play-pause-btn" class="control-btn" onclick="togglePlayPause()">▶ Play</button>
                <span id="time-display" class="time-display">0:00 / 0:00</span>
            </div>
            
            <input type="range" id="progress-bar" min="0" max="100" value="0" step="0.1" 
                   oninput="draggingTimeline()" onchange="seekVideo()">
            
            <div class="control-group">
                <label style="font-size: 0.85rem;">Speed: <span id="speed-display">1.0x</span></label>
                <input type="range" id="speed-slider" class="speed-slider" min="0.5" max="3" step="0.25" value="1" oninput="changeSpeed()">
                <button onclick="toggleFullScreen()" class="control-btn" style="background: #10b981;">⛶ Full Screen</button>
            </div>
        </div>
    </div>

    <button id="generate-report-btn" class="btn-primary report-btn" onclick="generateReport()">End Session & Generate Report</button>
    
    <!-- Printable Area for Download -->
    <div id="report-wrapper" style="display:none;">
        <div id="printable-report">
            <div class="report-header">
                <div>
                    <h3 style="margin-top:0; color:#1e293b;">Official Watch Report</h3>
                    <div class="summary-box" id="report-summary"></div>
                </div>
                <div id="qrcode-container">
                    <div id="qrcode"></div>
                    <p>Auth Signature</p>
                </div>
            </div>

            <h4>Timeline Graph (Real-time vs. Video Time):</h4>
            <div class="chart-container">
                <canvas id="watchGraph"></canvas>
            </div>

            <h4>Detailed Tracking Logs:</h4>
            <div id="report-logs"></div>
        </div>
        <button class="btn-primary download-btn" id="download-btn" onclick="downloadReportAsPNG()">Download Report as PNG</button>
    </div>
</div>

<script>
    // 1. Clock Setup (IST)
    function updateClock() {
        const now = new Date();
        document.getElementById('ist-clock').innerText = now.toLocaleTimeString('en-IN', { timeZone: 'Asia/Kolkata', hour12: true });
    }
    setInterval(updateClock, 1000);
    updateClock();

    // 2. Global Variables
    let player;
    let activityLogs = [];
    let graphData = []; 
    let sessionStartTime = null;
    let isVideoPlaying = false;
    let trackingInterval;
    let lastVideoTime = 0;
    
    let totalRealPlayTimeMs = 0;
    let totalRealPauseTimeMs = 0;
    let seekCount = 0;
    let currentSpeed = 1;
    let isDraggingTimeline = false;

    // Load YT API
    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    const firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    function extractVideoID(url) {
        const match = url.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/);
        return (match && match[2].length === 11) ? match[2] : null;
    }

    // 3. Load Video & Initialize Custom Player
    function loadVideo() {
        const videoId = extractVideoID(document.getElementById('video-url').value);
        if (!videoId) return alert("Please enter a valid YouTube link!");

        document.getElementById('video-wrapper').style.display = "block";
        document.getElementById('generate-report-btn').style.display = "block";
        document.getElementById('report-wrapper').style.display = "none";
        
        activityLogs = [];
        graphData = [];
        sessionStartTime = new Date();
        totalRealPlayTimeMs = 0;
        totalRealPauseTimeMs = 0;
        seekCount = 0;
        currentSpeed = 1;
        lastVideoTime = 0;
        isDraggingTimeline = false;
        
        document.getElementById('speed-slider').value = 1;
        document.getElementById('speed-display').innerText = "1.0x";
        document.getElementById('progress-bar').value = 0;
        
        logActivity("System", "Video session started", 0);

        let currentOrigin = window.location.origin;
        if (!currentOrigin || currentOrigin === "null" || window.location.protocol.startsWith("file")) {
            currentOrigin = "https://www.youtube.com"; 
        }

        if (player && typeof player.loadVideoById === 'function') {
            player.loadVideoById(videoId);
        } else {
            player = new YT.Player('player', {
                videoId: videoId,
                host: 'https://www.youtube.com',
                playerVars: { 
                    'controls': 0,          // COMPLETELY hides YouTube native controls
                    'disablekb': 1,         // Disables keyboard shortcuts on YouTube player
                    'rel': 0,               
                    'modestbranding': 1, 
                    'iv_load_policy': 3,    // Hides annotations
                    'origin': currentOrigin, 
                    'enablejsapi': 1
                },
                events: {
                    'onStateChange': onPlayerStateChange,
                    'onPlaybackRateChange': onPlaybackRateChange,
                    'onReady': () => { setInterval(updateCustomUI, 500); } // Sync progress bar
                }
            });
        }

        clearInterval(trackingInterval);
        trackingInterval = setInterval(trackRealtimeData, 1000);
    }

    // 4. Custom Video Click Handler (Single Click = Play/Pause | Double Click = Skip 10s)
    let clickTimer = null;
    function handleVideoClick(event) {
        if (!player || typeof player.getCurrentTime !== 'function') return;

        if (clickTimer) {
            clearTimeout(clickTimer);
            clickTimer = null;
            
            // Double Click Detected
            const rect = document.getElementById('video-shield').getBoundingClientRect();
            const clickX = event.clientX - rect.left;
            const width = rect.width;
            
            if (clickX < width * 0.4) {
                skipTime(-10); // Clicked Left Side
            } else if (clickX > width * 0.6) {
                skipTime(10); // Clicked Right Side
            } else {
                toggleFullScreen(); // Clicked Center
            }
        } else {
            // Wait to see if it's a single or double click
            clickTimer = setTimeout(() => {
                clickTimer = null;
                togglePlayPause(); // Single Click Detected
            }, 250); 
        }
    }

    function togglePlayPause() {
        if (!player || typeof player.getPlayerState !== 'function') return;
        if (player.getPlayerState() === YT.PlayerState.PLAYING) {
            player.pauseVideo();
        } else {
            player.playVideo();
        }
    }

    function skipTime(seconds) {
        if (!player || typeof player.getCurrentTime !== 'function') return;
        const newTime = player.getCurrentTime() + seconds;
        player.seekTo(newTime, true);
        
        // Show Visual Feedback Text
        const feedback = document.getElementById('skip-feedback');
        feedback.innerText = seconds > 0 ? ">> 10s" : "<< 10s";
        feedback.style.left = seconds > 0 ? "75%" : "25%";
        feedback.classList.add('show');
        setTimeout(() => feedback.classList.remove('show'), 400);
    }

    // 5. Custom Controls Logic (Timeline & Speed)
    function formatTimeSec(seconds) {
        if (isNaN(seconds)) return "0:00";
        const m = Math.floor(seconds / 60);
        const s = Math.floor(seconds % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
    }

    function updateCustomUI() {
        if (!player || !player.getCurrentTime || isDraggingTimeline) return;
        const current = player.getCurrentTime();
        const duration = player.getDuration();
        
        if (duration > 0) {
            document.getElementById('progress-bar').value = (current / duration) * 100;
            document.getElementById('time-display').innerText = `${formatTimeSec(current)} / ${formatTimeSec(duration)}`;
        }
    }

    function draggingTimeline() {
        isDraggingTimeline = true;
        if (!player || !player.getDuration) return;
        const val = document.getElementById('progress-bar').value;
        const duration = player.getDuration();
        document.getElementById('time-display').innerText = `${formatTimeSec((val / 100) * duration)} / ${formatTimeSec(duration)}`;
    }

    function seekVideo() {
        if (!player || !player.getDuration) return;
        const val = document.getElementById('progress-bar').value;
        const duration = player.getDuration();
        player.seekTo((val / 100) * duration, true);
        isDraggingTimeline = false;
    }

    function changeSpeed() {
        const speed = document.getElementById('speed-slider').value;
        document.getElementById('speed-display').innerText = speed + "x";
        if (player && typeof player.setPlaybackRate === 'function') {
            player.setPlaybackRate(parseFloat(speed));
        }
    }

    function toggleFullScreen() {
        const wrapper = document.getElementById('video-wrapper');
        if (!document.fullscreenElement) {
            if (wrapper.requestFullscreen) { wrapper.requestFullscreen(); }
            else if (wrapper.webkitRequestFullscreen) { wrapper.webkitRequestFullscreen(); } 
        } else {
            if (document.exitFullscreen) { document.exitFullscreen(); }
        }
    }

    // 6. Track Background Data (Graph & Reporting)
    function trackRealtimeData() {
        if (!player || !player.getCurrentTime) return;
        
        const now = new Date();
        const elapsedRealSec = Math.floor((now - sessionStartTime) / 1000);
        const currentVideoTime = player.getCurrentTime();

        if (isVideoPlaying) {
            const expectedTime = lastVideoTime + (1 * currentSpeed);
            if (Math.abs(currentVideoTime - expectedTime) > 2.5) {
                seekCount++;
                logActivity("Seek/Drag", `Video timeline jumped`, currentVideoTime);
            }
            totalRealPlayTimeMs += 1000;
        } else {
            totalRealPauseTimeMs += 1000;
        }

        graphData.push({ x: elapsedRealSec, y: currentVideoTime });
        lastVideoTime = currentVideoTime;
    }

    // 7. Event Listeners
    function onPlayerStateChange(event) {
        const vTime = player.getCurrentTime();
        const btn = document.getElementById('play-pause-btn');
        
        if (event.data == YT.PlayerState.PLAYING) {
            isVideoPlaying = true;
            btn.innerHTML = "⏸ Pause";
            btn.style.background = "#dc2626"; // Red when playing
            logActivity("Play", "Video started playing", vTime);
        } else if (event.data == YT.PlayerState.PAUSED) {
            isVideoPlaying = false;
            btn.innerHTML = "▶ Play";
            btn.style.background = "#2563eb"; // Blue when paused
            logActivity("Pause", "Video paused", vTime);
        } else if (event.data == YT.PlayerState.ENDED) {
            btn.innerHTML = "↺ Replay";
        }
    }

    function onPlaybackRateChange(event) {
        currentSpeed = event.data;
        document.getElementById('speed-slider').value = currentSpeed;
        document.getElementById('speed-display').innerText = currentSpeed + "x";
        logActivity("Speed", `Playback speed changed to ${currentSpeed}x`, player.getCurrentTime());
    }

    function logActivity(action, details, vTimeSec) {
        const now = new Date();
        const timeStr = now.toLocaleTimeString('en-IN', { timeZone: 'Asia/Kolkata', hour12: true });
        activityLogs.push({ realTime: timeStr, videoTime: formatTimeSec(vTimeSec), action, details });
    }

    // 8. Generate Report
    function formatDur(ms) {
        const s = Math.floor(ms / 1000);
        return `${Math.floor(s / 60)} min ${s % 60} sec`;
    }

    function generateReport() {
        if (!sessionStartTime) return;
        clearInterval(trackingInterval);
        player.pauseVideo();
        logActivity("System", "Report generation complete", player.getCurrentTime());

        document.getElementById('video-wrapper').style.display = "none";
        document.getElementById('generate-report-btn').style.display = "none";
        document.getElementById('report-wrapper').style.display = "block";
        document.getElementById('download-btn').style.display = "block";

        if (document.fullscreenElement) { document.exitFullscreen(); }

        document.getElementById('report-summary').innerHTML = `
            Total Session Time: ${formatDur(new Date() - sessionStartTime)}<br>
            Total Play Time: <span style="color: green;">${formatDur(totalRealPlayTimeMs)}</span><br>
            Total Pause Time: <span style="color: red;">${formatDur(totalRealPauseTimeMs)}</span><br>
            Total Seeks (Drags/Skips): <span style="color: orange;">${seekCount} times</span>
        `;

        let logsHTML = "";
        activityLogs.forEach(l => {
            let col = "black";
            if(l.action === "Play") col = "green";
            if(l.action === "Pause") col = "red";
            if(l.action === "Seek/Drag") col = "orange";
            if(l.action === "Speed") col = "blue";
            logsHTML += `<div class="log-item"><span>[${l.realTime}]</span> | Video Time: <span>${l.videoTime}</span> | <span style="color:${col};">${l.action}</span> - ${l.details}</div>`;
        });
        document.getElementById('report-logs').innerHTML = logsHTML;

        generateGraph();
        generateComplexQR();
    }

    // 9. Graph Generation (Chart.js)
    let watchChart = null;
    function generateGraph() {
        const ctx = document.getElementById('watchGraph').getContext('2d');
        if(watchChart) watchChart.destroy(); 

        const xData = graphData.map(d => d.x);
        const yData = graphData.map(d => d.y);

        watchChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: xData,
                datasets: [{
                    label: 'Video Timeline Position (sec)',
                    data: yData,
                    borderColor: '#2563eb', backgroundColor: 'rgba(37, 99, 235, 0.2)',
                    borderWidth: 2, pointRadius: 0, tension: 0.1 
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                scales: {
                    x: { title: { display: true, text: 'Real Time (Seconds spent on website)' } },
                    y: { title: { display: true, text: 'Video Timeline (Seconds)' } }
                },
                plugins: { title: { display: true, text: 'Normal Watch = Straight line. Vertical jumps = Seeking/Dragging.' } }
            }
        });
    }

    // 10. Complex QR Code
    function generateComplexQR() {
        document.getElementById("qrcode").innerHTML = ""; 
        const rawData = `S:${sessionStartTime.getTime()}|PT:${totalRealPlayTimeMs}|PA:${totalRealPauseTimeMs}|SK:${seekCount}|SP:${currentSpeed}`;
        const hashedData = btoa(encodeURIComponent(rawData)).substring(0, 50); 
        const authSignature = `AUTH_YT_${Math.floor(Math.random() * 999999)}_${hashedData}`;

        new QRCode(document.getElementById("qrcode"), { text: authSignature, width: 100, height: 100, colorDark: "#0f172a", colorLight: "#ffffff" });
    }

    // 11. Download as PNG
    function downloadReportAsPNG() {
        const reportElement = document.getElementById('printable-report');
        const btn = document.getElementById('download-btn');
        btn.innerText = "Preparing... (Please wait)";
        btn.disabled = true;

        html2canvas(reportElement, { scale: 2, useCORS: true, backgroundColor: "#ffffff" }).then(canvas => {
            const a = document.createElement('a');
            a.href = canvas.toDataURL("image/png");
            a.download = `Video_Audit_Report_${new Date().getTime()}.png`;
            a.click();
            btn.innerText = "Download Report as PNG";
            btn.disabled = false;
        }).catch(() => {
            alert("Error generating screenshot!");
            btn.innerText = "Download Report as PNG";
            btn.disabled = false;
        });
    }
</script>

</body>
</html>
