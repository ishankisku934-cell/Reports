<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Advanced YouTube Tracker</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        * { box-sizing: border-box; }
        
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --text: #0f172a;
            --card-bg: #ffffff;
            --dark-player: #0f172a;
        }
        
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 15px 10px; overflow-x: hidden; }
        
        .container { max-width: 900px; width: 100%; background: var(--card-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .clock-box { background: #1e293b; color: #10b981; padding: 8px 15px; border-radius: 6px; font-family: monospace; font-size: 1.2rem; font-weight: bold; }
        
        .refresh-btn { background: #ef4444; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 1rem; font-weight: bold; transition: 0.2s; display: flex; align-items: center; gap: 5px; }
        .refresh-btn:hover { background: #dc2626; }
        .header-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

        .input-group { display: flex; gap: 10px; margin-bottom: 15px; width: 100%; flex-wrap: wrap; }
        input[type="text"] { flex: 1; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 1rem; min-width: 200px; }
        .btn-primary { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 1rem; font-weight: bold; transition: 0.2s; white-space: nowrap; }
        .btn-primary:hover { background: #1d4ed8; }
        
        /* ---------------- Player Wrapper ---------------- */
        #video-wrapper { width: 100%; background: var(--dark-player); border-radius: 8px; overflow: hidden; display: none; position: relative; cursor: default; }
        #player-container { position: relative; width: 100%; padding-bottom: 56.25%; background: #000; }
        #player { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; pointer-events: none; }
        
        #video-wrapper:fullscreen { border-radius: 0; width: 100vw !important; height: 100vh !important; display: block; background: #000; }
        #video-wrapper:fullscreen #player-container { padding-bottom: 0; height: 100%; width: 100%; }
        #video-wrapper:-webkit-full-screen { border-radius: 0; width: 100vw !important; height: 100vh !important; display: block; background: #000; }
        #video-wrapper:-webkit-full-screen #player-container { padding-bottom: 0; height: 100%; width: 100%; }
        
        #big-play-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(37, 99, 235, 0.9); color: white; border: none; font-size: 1.5rem; font-weight: bold; padding: 20px 40px; border-radius: 50px; cursor: pointer; z-index: 25; box-shadow: 0 4px 15px rgba(0,0,0,0.5); transition: 0.2s; }
        #big-play-btn:hover { background: #1d4ed8; transform: translate(-50%, -50%) scale(1.05); }

        .static-blocker { position: absolute; z-index: 10; background: transparent; cursor: default; }
        .blocker-top { top: 0; left: 0; width: 100%; height: 60px; }
        .blocker-bottom { bottom: 0; right: 0; width: 120px; height: 60px; }

        #dynamic-shield { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; display: none; cursor: pointer; }
        
        .skip-feedback { position: absolute; top: 50%; transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.75); color: white; padding: 15px 25px; border-radius: 30px; font-size: 1.5rem; font-weight: bold; pointer-events: none; opacity: 0; transition: opacity 0.3s ease; z-index: 30; }
        .skip-feedback.show { opacity: 1; }

        .center-action-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(1.5); background: rgba(0, 0, 0, 0.7); color: white; width: 70px; height: 70px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 2rem; pointer-events: none; opacity: 0; transition: opacity 0.2s ease, transform 0.2s ease; z-index: 35; }
        .center-action-icon.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

        /* ---------------- Overlay Controls ---------------- */
        #custom-controls { position: absolute; bottom: 0; left: 0; width: 100%; box-sizing: border-box; display: flex; align-items: center; justify-content: space-between; gap: 12px; background: rgba(15, 23, 42, 0.85); padding: 15px 20px; color: white; flex-wrap: wrap; z-index: 40; transition: opacity 0.4s ease, transform 0.4s ease; }
        #custom-controls.hidden { opacity: 0; pointer-events: none; transform: translateY(10px); }

        .control-group { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .control-btn { background: #334155; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .control-btn:hover { background: #475569; }
        .time-display { font-family: monospace; font-size: 0.95rem; white-space: nowrap; color: #cbd5e1; }
        #progress-bar { flex-grow: 1; cursor: pointer; height: 6px; border-radius: 5px; accent-color: var(--primary); min-width: 100px; }
        .speed-slider { width: 70px; cursor: pointer; accent-color: #10b981; }
        
        select.control-btn { padding: 6px; font-size: 0.85rem; appearance: none; outline: none; }

        .report-btn { background: #dc2626; width: 100%; margin-top: 15px; padding: 15px; display: none; }
        .report-btn:hover { background: #b91c1c; }
        .download-btn { background: #10b981; width: 100%; margin-top: 15px; padding: 15px; display: none; }
        .download-btn:hover { background: #059669; }
        
        /* ---------------- Report Section ---------------- */
        #printable-report { background: #ffffff; border-radius: 8px; margin-top: 20px; width: 100%; box-sizing: border-box; word-wrap: break-word; }
        
        /* PDF specific styles */
        .session-report-block { padding: 20px; border: 2px solid #e2e8f0; border-radius: 8px; margin-bottom: 30px; background: #ffffff; width: 100%; box-sizing: border-box; }
        
        .new-data-format { display: flex; flex-direction: column; gap: 10px; margin: 20px 0; width: 100%; }
        .data-card { display: flex; justify-content: space-between; align-items: center; background: #f1f5f9; padding: 12px 20px; border-radius: 8px; border: 1px solid #e2e8f0; width: 100%; word-wrap: break-word; }
        .data-title { font-weight: bold; color: #475569; font-size: 1rem; flex: 1; }
        .data-value { font-weight: bold; font-size: 1.1rem; text-align: right; }
        
        .qr-wrapper { text-align: center; margin: 0 auto; padding: 20px; }
        .qr-wrapper p { margin: 15px 0 0 0; font-size: 1rem; color: #64748b; font-weight: bold; }
        
        .chart-container { position: relative; width: 100%; height: 350px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px; box-sizing: border-box; }
        
        .log-item { padding: 10px; border-bottom: 1px solid #cbd5e1; font-size: 0.95rem; word-wrap: break-word; white-space: normal; line-height: 1.4; }
        .log-item span { font-weight: bold; }
        
        @media (max-width: 600px) {
            .chart-container { height: 250px; }
            #custom-controls { padding: 10px; }
            .control-group { gap: 8px; justify-content: center; width: 100%; }
            #progress-bar { width: 100%; order: -1; margin-bottom: 5px; } 
            .input-group { flex-direction: column; }
            .data-card { flex-direction: column; align-items: flex-start; gap: 5px; }
            .data-value { text-align: left; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>Advanced Video Tracker</h2>
        <div class="header-actions">
            <button class="refresh-btn" onclick="confirmRefresh()" title="Refresh and Reset">🔄 Refresh</button>
            <div class="clock-box" id="ist-clock">00:00:00 AM</div>
        </div>
    </div>

    <div class="input-group">
        <input type="text" id="video-url" placeholder="Enter YouTube Video URL here...">
        <button class="btn-primary" onclick="initVideoLoad()">Load Video</button>
    </div>

    <div id="video-wrapper">
        <div id="player-container">
            <div id="player"></div>
            <div class="static-blocker blocker-top"></div>
            <div class="static-blocker blocker-bottom"></div>
            <div id="dynamic-shield" onclick="handleVideoClick(event)"></div>
            <button id="big-play-btn" onclick="startInitialPlayback(event)">▶ Start Video</button>
            <div id="skip-feedback" class="skip-feedback"></div>
            <div id="center-action-icon" class="center-action-icon"></div>
        </div>
        
        <div id="custom-controls">
            <div class="control-group">
                <button id="play-pause-btn" class="control-btn" onclick="togglePlayPause()">▶ Play</button>
                <span id="time-display" class="time-display">0:00 / 0:00</span>
            </div>
            
            <input type="range" id="progress-bar" min="0" max="100" value="0" step="0.1" oninput="draggingTimeline()" onchange="seekVideo()">
            
            <div class="control-group">
                <label style="font-size: 0.85rem;">Quality:</label>
                <select id="quality-select" class="control-btn" onchange="changeQuality()">
                    <option value="default">Auto</option>
                    <option value="tiny">144p</option>
                    <option value="small">240p</option>
                    <option value="medium">360p</option>
                    <option value="large">480p</option>
                    <option value="hd720">720p</option>
                    <option value="hd1080">1080p</option>
                    <option value="hd1440">2K</option>
                    <option value="highres">4K</option>
                </select>

                <label style="font-size: 0.85rem; margin-left: 5px;">Speed: <span id="speed-display">1.0x</span></label>
                <input type="range" id="speed-slider" class="speed-slider" min="0.5" max="3" step="0.25" value="1" oninput="changeSpeed()">
                
                <button onclick="toggleFullScreen()" class="control-btn" style="background: #10b981;">⛶ Full</button>
            </div>
        </div>
    </div>

    <button id="generate-report-btn" class="btn-primary report-btn" onclick="generateReport()">End Session & Generate Report</button>
    
    <div id="report-wrapper" style="display:none;">
        <div id="printable-report"></div>
        <button class="btn-primary download-btn" id="download-btn" onclick="downloadReportAsPDF()">Download Report as PDF</button>
    </div>
</div>

<script>
    // ---------------- Anti Pull-to-Refresh Logic (JS Method) ----------------
    let touchStartY = 0;
    document.addEventListener('touchstart', e => { 
        touchStartY = e.touches[0].clientY; 
    }, {passive: false});
    
    document.addEventListener('touchmove', e => {
        let touchY = e.touches[0].clientY;
        let touchDiff = touchY - touchStartY;
        if (touchDiff > 0 && window.scrollY === 0) {
            e.preventDefault(); 
        }
    }, {passive: false});

    // ---------------- Refresh Button Confirmation ----------------
    function confirmRefresh() {
        if (confirm("Are you sure you want to refresh? All your tracking data will be permanently lost!")) {
            window.onbeforeunload = null; 
            window.location.reload();
        }
    }

    window.addEventListener('beforeunload', function (e) {
        if (sessionStartTime) { 
            e.preventDefault();
            e.returnValue = '';
        }
    });

    // ---------------- Existing Logic ----------------
    function updateClock() { document.getElementById('ist-clock').innerText = new Date().toLocaleTimeString('en-IN', { timeZone: 'Asia/Kolkata', hour12: true }); }
    setInterval(updateClock, 1000); updateClock();

    let player, activityLogs = [], graphData = [], sessionStartTime = null, isVideoPlaying = false;
    let trackingInterval, lastVideoTime = 0, totalRealPlayTimeMs = 0, totalRealPauseTimeMs = 0;
    let seekCount = 0, currentSpeed = 1, isDraggingTimeline = false, isFirstPlay = true;
    let hideControlsTimeout; let isControlsVisible = true;
    let reportCounter = 0; 

    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    const firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    function extractVideoID(url) {
        const regExp = /^.*(youtu\.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=|\/live\/|\/shorts\/)([^#\&\?]*).*/;
        const match = url.match(regExp);
        return (match && match[2].length === 11) ? match[2] : null;
    }

    function formatTimeSec(seconds) { 
        if (isNaN(seconds)) return "0:00"; 
        const h = Math.floor(seconds / 3600);
        const m = Math.floor((seconds % 3600) / 60);
        const s = Math.floor(seconds % 60).toString().padStart(2, '0');
        if (h > 0) return `${h}:${m.toString().padStart(2, '0')}:${s}`;
        return `${m}:${s}`; 
    }

    function toggleControlsVisibility() { if (isControlsVisible) hideControls(); else showControls(); }
    function showControls() {
        const controls = document.getElementById('custom-controls'), wrapper = document.getElementById('video-wrapper');
        if (controls) { controls.classList.remove('hidden'); wrapper.style.cursor = "default"; isControlsVisible = true; }
        clearTimeout(hideControlsTimeout);
        if (isVideoPlaying) hideControlsTimeout = setTimeout(hideControls, 3500);
    }
    function hideControls() {
        const controls = document.getElementById('custom-controls'), wrapper = document.getElementById('video-wrapper');
        if (controls) { controls.classList.add('hidden'); wrapper.style.cursor = "none"; isControlsVisible = false; }
        clearTimeout(hideControlsTimeout);
    }

    let lastMouseX = 0, lastMouseY = 0;
    document.getElementById('video-wrapper').addEventListener('mousemove', (e) => {
        if (Math.abs(e.clientX - lastMouseX) > 5 || Math.abs(e.clientY - lastMouseY) > 5) { showControls(); lastMouseX = e.clientX; lastMouseY = e.clientY; }
    });
    document.getElementById('custom-controls').addEventListener('click', (e) => { e.stopPropagation(); showControls(); });

    function showCenterIcon(type) {
        const icon = document.getElementById('center-action-icon');
        icon.innerHTML = type === 'play' ? '▶' : '⏸';
        icon.classList.add('show'); setTimeout(() => icon.classList.remove('show'), 500);
    }

    function initVideoLoad() {
        const videoId = extractVideoID(document.getElementById('video-url').value);
        if (!videoId) return alert("Please enter a valid YouTube link!");

        if (document.getElementById('report-wrapper').style.display === "block") {
            if (!confirm("আপনি কি সত্যিই নতুন ভিডিও প্লে করতে চান? (Are you sure you want to load a new video? Previous report will be saved below.)")) {
                return; 
            }
        }

        document.getElementById('video-wrapper').style.display = "block";
        document.getElementById('generate-report-btn').style.display = "block";
        document.getElementById('dynamic-shield').style.display = "none"; 
        
        activityLogs = []; graphData = []; sessionStartTime = new Date();
        totalRealPlayTimeMs = 0; totalRealPauseTimeMs = 0; seekCount = 0; currentSpeed = 1; lastVideoTime = 0;
        isFirstPlay = true; isDraggingTimeline = false;
        
        document.getElementById('speed-slider').value = 1; document.getElementById('speed-display').innerText = "1.0x";
        document.getElementById('quality-select').value = "default";
        document.getElementById('progress-bar').value = 0;
        document.getElementById('big-play-btn').style.display = "block"; 
        
        showControls(); logActivity("System", "Video loaded. Waiting for interaction.", 0);
        let currentOrigin = window.location.origin;
        if (!currentOrigin || currentOrigin === "null" || window.location.protocol.startsWith("file")) currentOrigin = "https://www.youtube.com"; 

        if (player && typeof player.destroy === 'function') player.destroy();
        document.getElementById('player-container').insertAdjacentHTML('afterbegin', '<div id="player"></div>');

        player = new YT.Player('player', {
            videoId: videoId, host: 'https://www.youtube.com',
            playerVars: { 'controls': 0, 'disablekb': 1, 'rel': 0, 'modestbranding': 1, 'playsinline': 1, 'origin': currentOrigin, 'enablejsapi': 1 },
            events: { 
                'onStateChange': onPlayerStateChange, 
                'onPlaybackRateChange': onPlaybackRateChange, 
                'onPlaybackQualityChange': onPlaybackQualityChange,
                'onReady': () => { setInterval(updateCustomUI, 500); } 
            }
        });
        clearInterval(trackingInterval); trackingInterval = setInterval(trackRealtimeData, 1000);
    }

    function startInitialPlayback(event) {
        event.stopPropagation(); document.getElementById('big-play-btn').style.display = "none";
        if (player && typeof player.playVideo === 'function') { player.playVideo(); isFirstPlay = false; }
    }

    function onPlayerStateChange(event) {
        const vTime = player.getCurrentTime(), btn = document.getElementById('play-pause-btn');
        if (event.data == YT.PlayerState.PLAYING) {
            document.getElementById('dynamic-shield').style.display = "block"; isVideoPlaying = true; 
            btn.innerHTML = "⏸ Pause"; btn.style.background = "#dc2626"; 
            logActivity("Play", "Video started playing", vTime); showCenterIcon('play'); showControls(); 
        } else if (event.data == YT.PlayerState.PAUSED) {
            isVideoPlaying = false; btn.innerHTML = "▶ Play"; btn.style.background = "#334155"; 
            logActivity("Pause", "Video paused", vTime); showCenterIcon('pause'); showControls(); 
        }
    }

    let clickTimer = null;
    function handleVideoClick(event) {
        if (isFirstPlay || !player || typeof player.getCurrentTime !== 'function') return;
        const rect = event.target.getBoundingClientRect(), clickX = event.clientX - rect.left, clickY = event.clientY - rect.top;
        const isCenterClick = (clickX > rect.width * 0.35 && clickX < rect.width * 0.65 && clickY > rect.height * 0.3 && clickY < rect.height * 0.7);

        if (clickTimer) {
            clearTimeout(clickTimer); clickTimer = null;
            if (!isCenterClick) { if (clickX < rect.width * 0.4) skipTime(-10); else if (clickX > rect.width * 0.6) skipTime(10); }
        } else {
            clickTimer = setTimeout(() => { clickTimer = null; if (isCenterClick) togglePlayPause(); else toggleControlsVisibility(); }, 250); 
        }
    }

    function togglePlayPause() { if (player.getPlayerState() === YT.PlayerState.PLAYING) player.pauseVideo(); else player.playVideo(); }
    function skipTime(seconds) {
        if (!player || typeof player.getCurrentTime !== 'function') return; player.seekTo(player.getCurrentTime() + seconds, true);
        const feedback = document.getElementById('skip-feedback'); feedback.innerText = seconds > 0 ? ">> 10s" : "<< 10s"; feedback.style.left = seconds > 0 ? "75%" : "25%";
        feedback.classList.add('show'); setTimeout(() => feedback.classList.remove('show'), 400);
    }
    
    function updateCustomUI() {
        if (!player || !player.getCurrentTime || isDraggingTimeline) return;
        const current = player.getCurrentTime(), duration = player.getDuration();
        if (duration > 0) { document.getElementById('progress-bar').value = (current / duration) * 100; document.getElementById('time-display').innerText = `${formatTimeSec(current)} / ${formatTimeSec(duration)}`; }
    }
    function draggingTimeline() { isDraggingTimeline = true; showControls(); if (!player || !player.getDuration) return; document.getElementById('time-display').innerText = `${formatTimeSec((document.getElementById('progress-bar').value / 100) * player.getDuration())} / ${formatTimeSec(player.getDuration())}`; }
    function seekVideo() { if (!player || !player.getDuration) return; player.seekTo((document.getElementById('progress-bar').value / 100) * player.getDuration(), true); isDraggingTimeline = false; }
    
    function changeSpeed() { const s = document.getElementById('speed-slider').value; document.getElementById('speed-display').innerText = s + "x"; if (player) player.setPlaybackRate(parseFloat(s)); showControls(); }
    
    function changeQuality() {
        const q = document.getElementById('quality-select').value;
        if (player && typeof player.setPlaybackQuality === 'function') { player.setPlaybackQuality(q); }
        showControls();
    }
    function onPlaybackQualityChange(event) {
        const select = document.getElementById('quality-select');
        if (select.querySelector(`option[value="${event.data}"]`)) { select.value = event.data; }
    }

    function toggleFullScreen() {
        const w = document.getElementById('video-wrapper');
        if (!document.fullscreenElement && !document.webkitFullscreenElement) { if (w.requestFullscreen) w.requestFullscreen(); else if (w.webkitRequestFullscreen) w.webkitRequestFullscreen(); } 
        else { if (document.exitFullscreen) document.exitFullscreen(); else if (document.webkitExitFullscreen) document.webkitExitFullscreen(); }
    }

    function trackRealtimeData() {
        if (!player || !player.getCurrentTime) return;
        const elapsedRealSec = Math.floor((new Date() - sessionStartTime) / 1000), currentVideoTime = player.getCurrentTime();
        if (isVideoPlaying) {
            if (Math.abs(currentVideoTime - (lastVideoTime + currentSpeed)) > 2.5) { seekCount++; logActivity("Seek/Drag", `Video timeline jumped`, currentVideoTime); }
            totalRealPlayTimeMs += 1000;
        } else totalRealPauseTimeMs += 1000;
        graphData.push({ x: elapsedRealSec, y: currentVideoTime }); lastVideoTime = currentVideoTime;
    }
    function onPlaybackRateChange(event) { currentSpeed = event.data; document.getElementById('speed-slider').value = currentSpeed; document.getElementById('speed-display').innerText = currentSpeed + "x"; logActivity("Speed", `Playback speed changed to ${currentSpeed}x`, player.getCurrentTime()); }
    function logActivity(action, details, vTimeSec) { activityLogs.push({ realTime: new Date().toLocaleTimeString('en-IN', { timeZone: 'Asia/Kolkata', hour12: true }), videoTime: formatTimeSec(vTimeSec), action, details }); }
    function formatDur(ms) { const totalSec = Math.floor(ms / 1000), h = Math.floor(totalSec / 3600), m = Math.floor((totalSec % 3600) / 60), s = totalSec % 60; if (h > 0) return `${h} hr ${m} min ${s} sec`; return `${m} min ${s} sec`; }

    // ---------------- Report Generation & PDF Structure ----------------
    function generateReport() {
        if (!sessionStartTime) return; 
        window.onbeforeunload = null; 
        
        clearInterval(trackingInterval); player.pauseVideo();
        logActivity("System", "Report generation complete", player.getCurrentTime());
        clearTimeout(hideControlsTimeout);
        
        document.getElementById('video-wrapper').style.display = "none"; 
        document.getElementById('generate-report-btn').style.display = "none";
        document.getElementById('report-wrapper').style.display = "block"; 
        document.getElementById('download-btn').style.display = "block";
        if (document.fullscreenElement || document.webkitFullscreenElement) toggleFullScreen();

        reportCounter++;
        const sessionId = Date.now(); 

        let logsHTML = ""; 
        activityLogs.forEach(l => { 
            let col = l.action === "Play" ? "green" : l.action === "Pause" ? "red" : l.action === "Seek/Drag" ? "orange" : "blue";
            // Ensure no line is cut in half across pages
            logsHTML += `<div class="log-item" style="page-break-inside: avoid;"><span>[${l.realTime}]</span> | Video Time: <span>${l.videoTime}</span> | <span style="color:${col};">${l.action}</span> - ${l.details}</div>`; 
        });

        // Smart HTML2PDF Page Break Structure with New Data Format
        const reportTemplate = `
            <div id="session-report-${sessionId}" class="session-report-block">
                
                <div>
                    <h2 style="text-align:center; color:#1e293b; border-bottom: 2px solid #cbd5e1; padding-bottom: 15px; margin-top:0;">Official Watch Report (Session ${reportCounter})</h2>
                    <div class="new-data-format">
                        <div class="data-card">
                            <span class="data-title">Total Session Time</span>
                            <span class="data-value">${formatDur(new Date() - sessionStartTime)}</span>
                        </div>
                        <div class="data-card">
                            <span class="data-title">Total Play Time</span>
                            <span class="data-value" style="color: green;">${formatDur(totalRealPlayTimeMs)}</span>
                        </div>
                        <div class="data-card">
                            <span class="data-title">Total Pause Time</span>
                            <span class="data-value" style="color: red;">${formatDur(totalRealPauseTimeMs)}</span>
                        </div>
                        <div class="data-card">
                            <span class="data-title">Total Seeks (Drags/Skips)</span>
                            <span class="data-value" style="color: orange;">${seekCount} times</span>
                        </div>
                    </div>
                </div>

                <div class="html2pdf__page-break"></div>

                <div style="text-align: center; padding-top: 20px;">
                    <h3 style="margin-bottom: 30px; color:#1e293b;">Authentication Signature</h3>
                    <div class="qr-wrapper">
                        <div id="qr-${sessionId}" style="display: flex; justify-content: center;"></div>
                        <p>Auth Signature</p>
                    </div>
                </div>

                <div class="html2pdf__page-break"></div>

                <div style="padding-top: 20px;">
                    <h3 style="text-align: center; margin-bottom:20px; color:#1e293b;">Timeline Graph (Real-time vs. Video Time)</h3>
                    <div class="chart-container" style="page-break-inside: avoid;">
                        <canvas id="graph-${sessionId}"></canvas>
                    </div>
                </div>

                <div class="html2pdf__page-break"></div>

                <div style="padding-top: 20px;">
                    <h3 style="color:#1e293b; border-bottom: 1px solid #cbd5e1; padding-bottom: 10px;">Detailed Tracking Logs:</h3>
                    <div>${logsHTML}</div>
                </div>
            </div>
        `;

        document.getElementById('printable-report').insertAdjacentHTML('afterbegin', reportTemplate);

        renderSpecificGraph(`graph-${sessionId}`, graphData);
        renderSpecificQR(`qr-${sessionId}`, totalRealPlayTimeMs, totalRealPauseTimeMs, seekCount, currentSpeed, sessionStartTime);
    }
    
    function renderSpecificGraph(canvasId, data) {
        const maxPoints = 500, step = Math.ceil(data.length / maxPoints) || 1;
        const optimizedX = data.filter((_, i) => i % step === 0).map(d => d.x);
        const optimizedY = data.filter((_, i) => i % step === 0).map(d => d.y);

        new Chart(document.getElementById(canvasId).getContext('2d'), { 
            type: 'line', 
            data: { labels: optimizedX, datasets: [{ label: 'Video Timeline Position (sec)', data: optimizedY, borderColor: '#2563eb', backgroundColor: 'rgba(37, 99, 235, 0.2)', borderWidth: 2, pointRadius: 0, tension: 0.1 }] }, 
            options: { 
                responsive: true, 
                maintainAspectRatio: false,
                animation: false // CRITICAL FIX: Disable animation so PDF catches the graph instantly
            } 
        });
    }

    function renderSpecificQR(containerId, pt, pa, sk, sp, startTime) {
        const container = document.getElementById(containerId);
        const rawData = `S:${startTime.getTime()}|PT:${pt}|PA:${pa}|SK:${sk}|SP:${sp}`;
        const hashedData = btoa(encodeURIComponent(rawData)).substring(0, 50);
        const authSignature = `AUTH_YT_${Math.floor(Math.random() * 999999)}_${hashedData}`;
        
        const tempDiv = document.createElement("div");
        new QRCode(tempDiv, { text: authSignature, width: 220, height: 220, colorDark: "#0f172a", colorLight: "#ffffff", correctLevel: QRCode.CorrectLevel.H });

        // Force conversion to pure image so PDF never skips it
        setTimeout(() => {
            const canvas = tempDiv.querySelector('canvas');
            if (canvas) {
                const img = document.createElement("img");
                img.src = canvas.toDataURL('image/png');
                img.style.width = "220px";
                img.style.height = "220px";
                img.style.display = "block";
                img.style.margin = "0 auto";
                container.appendChild(img);
            }
        }, 300);
    }

    // ---------------- Smart PDF Generation ----------------
    function downloadReportAsPDF() {
        const btn = document.getElementById('download-btn'); 
        btn.innerText = "Generating PDF... (Please wait)"; 
        btn.disabled = true;

        const element = document.getElementById('printable-report');

        // Prevent layout squishing by forcing a desktop-like width before print
        const originalWidth = element.style.width;
        element.style.width = '800px';

        const opt = {
            margin:       10, 
            filename:     `Video_Audit_Report_${new Date().getTime()}.pdf`,
            image:        { type: 'jpeg', quality: 1.0 },
            html2canvas:  { scale: 2, useCORS: true, windowWidth: 800 }, 
            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
            // Legacy mode correctly parses .html2pdf__page-break
            pagebreak:    { mode: ['css', 'legacy'] } 
        };

        // Delay added to ensure graph and QR are fully rendered before snapshot
        setTimeout(() => {
            html2pdf().set(opt).from(element).save().then(() => {
                element.style.width = originalWidth; // Restore width
                btn.innerText = "Download Report as PDF"; 
                btn.disabled = false;
            }).catch(err => {
                console.error(err);
                alert("Error generating PDF!");
                element.style.width = originalWidth;
                btn.innerText = "Download Report as PDF"; 
                btn.disabled = false;
            });
        }, 1000); // 1 Second Delay for Perfect Print
    }
</script>
